<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="utf-8">
    <title>Bio-Central</title>

    <link rel="icon" href="{{ url_for('static', filename='newtrendslogo.png') }}" type="image/x-icon">

    <link rel="stylesheet" href="{{ url_for('static', filename='bootstrap/css/bootstrap.min.css') }}">
    <script src="{{ url_for('static', filename='bootstrap/js/jquery-3.3.1.min.js') }}"></script>
    <script src="{{ url_for('static', filename='bootstrap/js/popper.js') }}"></script>
    <script src="{{ url_for('static', filename='bootstrap/js/bootstrap.min.js') }}"></script>

    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel="stylesheet" href="{{ url_for('static', filename='bootstrap/css/all.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='bootstrap/css/fontawesome.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='bootstrap/fontawesome-free-6.7.2-web/css/all.css') }}">

    <style>
        /* Universal Box Sizing */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #0a0a12 0%, #15151e 100%);
            color: #ffffff;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            margin: 0;
            overflow-x: hidden;
        }

        /* =========================================
           PREMIUM CYBERPUNK NAVBAR
        ========================================= */
        .bento-header {
            position: fixed; /* Changed to Fixed for guaranteed stickiness */
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1050;
            background: rgba(10, 10, 18, 0.75);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-bottom: 1px solid rgba(77, 163, 255, 0.15);
            padding: 0 2rem;
            height: 76px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        /* Animated Glowing Edge */
        .bento-header::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 0;
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(77, 163, 255, 0.8), transparent);
            animation: scanlineX 4s ease-in-out infinite;
            opacity: 0.5;
        }

        @keyframes scanlineX {
            0% { background-position: -200% 0; }
            100% { background-position: 200% 0; }
        }

        /* Brand Area - Perfectly Centered Layout */
        .header-brand {
            display: flex;
            align-items: center; /* Mathematically centers all items vertically */
            gap: 12px;
            text-decoration: none;
            transition: all 0.3s ease;
            border-radius: 12px;
            padding: 4px;
        }

        .header-brand:hover {
            text-decoration: none;
        }

        .nav-brand-img {
            height: 32px; 
            width: auto;
            display: block; /* Removes bottom invisible margin */
            filter: brightness(0) invert(1); /* Pure white */
            opacity: 1;
            transition: all 0.3s;
        }

        .header-brand:hover .nav-brand-img {
            filter: brightness(0) invert(1) drop-shadow(0 0 10px rgba(255,255,255,0.4));
            transform: translateY(-1px);
        }

        /* Subtle divider between logo and text */
        .nav-divider {
            width: 1px;
            height: 28px;
            background: rgba(255, 255, 255, 0.2);
            margin: 0 4px;
        }

        .brand-text {
            display: flex;
            flex-direction: column;
            justify-content: center; /* Internal vertical centering */
            line-height: 1.1; /* Tightened line height */
            transition: transform 0.3s;
        }

        .header-brand:hover .brand-text {
            transform: translateX(4px);
        }

        .brand-name {
            font-size: 1.1rem;
            font-weight: 800;
            color: #ffffff;
            letter-spacing: 0.5px;
            text-shadow: 0 0 10px rgba(77, 163, 255, 0.2);
            margin-bottom: 2px; /* Balances the top and bottom text */
        }

        .brand-sub {
            font-size: 0.65rem;
            font-weight: 600;
            color: #4da3ff;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            opacity: 0.8;
        }

        /* Nav area & Burger menu button */
        .header-nav {
            display: flex;
            align-items: center;
        }

        .custom-dropdown {
            position: relative;
            display: inline-block;
        }

        .custom-pill-btn {
            background: rgba(255, 255, 255, 0.03);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            width: 44px;
            height: 44px;
            padding: 0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 6px;
        }

        .custom-pill-btn:hover {
            background: rgba(77, 163, 255, 0.1);
            border-color: rgba(77, 163, 255, 0.3);
            box-shadow: 0 0 15px rgba(77, 163, 255, 0.2);
        }

        .custom-pill-btn.active {
            background: rgba(77, 163, 255, 0.15);
            border-color: #4da3ff;
            box-shadow: 0 0 20px rgba(77, 163, 255, 0.3);
        }

        /* Burger lines */
        .burger-line {
            display: block;
            width: 20px;
            height: 2px;
            background: currentColor;
            border-radius: 2px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            transform-origin: center;
        }

        .custom-pill-btn.active .burger-line:nth-child(1) {
            transform: translateY(8px) rotate(45deg);
        }

        .custom-pill-btn.active .burger-line:nth-child(2) {
            opacity: 0;
            transform: scaleX(0);
        }

        .custom-pill-btn.active .burger-line:nth-child(3) {
            transform: translateY(-8px) rotate(-45deg);
        }

        /* Dropdown menu */
        .custom-dropdown-menu {
            position: absolute;
            top: calc(100% + 15px);
            right: 0;
            min-width: 240px;
            background: rgba(15, 15, 22, 0.95);
            border: 1px solid rgba(77, 163, 255, 0.2);
            border-radius: 16px;
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(77, 163, 255, 0.1) inset;
            padding: 0.75rem;
            z-index: 1060;
            opacity: 0;
            visibility: hidden;
            transform: translateY(-15px) scale(0.95);
            transform-origin: top right;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.1);
        }

        .custom-dropdown-menu.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0) scale(1);
        }

        /* Dropdown header label */
        .dropdown-label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: rgba(255, 255, 255, 0.4);
            padding: 8px 12px 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dropdown-label::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255, 255, 255, 0.1);
        }

        .custom-dropdown-item {
            display: flex;
            align-items: center;
            color: rgba(255, 255, 255, 0.75);
            padding: 10px 12px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            border-radius: 10px;
            transition: all 0.2s ease;
            gap: 12px;
            position: relative;
            overflow: hidden;
        }

        .custom-dropdown-item .item-icon {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            flex-shrink: 0;
            transition: all 0.2s ease;
        }

        .custom-dropdown-item:hover {
            background: rgba(77, 163, 255, 0.1);
            color: #ffffff;
            text-decoration: none;
            transform: translateX(4px);
        }

        .custom-dropdown-item:hover .item-icon {
            transform: scale(1.1);
        }

        .custom-dropdown-item.danger {
            color: #fc8181;
            margin-top: 0.25rem;
        }

        .custom-dropdown-item.danger:hover {
            background: rgba(239, 68, 68, 0.15);
            color: #ff9999;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.2);
        }

        /* Alert Glass Effect */
        .alert-glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(77, 163, 255, 0.2);
            border-left: 4px solid #4da3ff;
            border-radius: 12px;
            color: #ffffff;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        /* Floating Back to Top */
        .btn-back-to-top {
            display: none;
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 99;
            background: rgba(77, 163, 255, 0.2);
            color: white;
            border: 1px solid rgba(77, 163, 255, 0.4);
            backdrop-filter: blur(5px);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(77, 163, 255, 0.2);
        }

        .btn-back-to-top:hover {
            background: rgba(77, 163, 255, 0.5);
            box-shadow: 0 0 20px rgba(77, 163, 255, 0.4);
            transform: translateY(-5px);
        }
    </style>
</head>

<body>
    {% if session['sdr_loggedin'] %}
    <header class="bento-header">
        <a href="{{ url_for('home') }}" class="header-brand">
            
            <img src="{{ url_for('static', filename='newtrends_long-removebg-preview.png') }}" alt="NIC Logo" class="nav-brand-img">
            
            <div class="nav-divider"></div>

            <div class="brand-text">
                <span class="brand-sub">Biometrics System</span>
            </div>
        </a>

        <nav class="header-nav">
            <div class="custom-dropdown">
                <div class="custom-pill-btn" id="optionsToggleBtn" title="Menu">
                    <span class="burger-line"></span>
                    <span class="burger-line"></span>
                    <span class="burger-line"></span>
                </div>
                <div class="custom-dropdown-menu" id="optionsDropdownMenu">
                    <div class="dropdown-label">Workspace</div>
                    
                    <a class="custom-dropdown-item" href="/device-manager">
                        <div class="item-icon" style="background: rgba(77,163,255,0.15); color: #4da3ff;">
                            <i class="fas fa-server"></i>
                        </div>
                        Device Manager
                    </a>
                    
                    <a class="custom-dropdown-item" href="/audit-logs">
                        <div class="item-icon" style="background: rgba(160,160,160,0.15); color: #c0c0c0;">
                            <i class="fas fa-file-invoice"></i>
                        </div>
                        Audit Logs
                    </a>
                    
                    <div class="dropdown-label" style="margin-top: 8px;">System</div>
                    
                    <a class="custom-dropdown-item danger" href="{{ url_for('logout') }}">
                        <div class="item-icon" style="background: rgba(239,68,68,0.15); color: #fc8181;">
                            <i class="fas fa-power-off"></i>
                        </div>
                        Terminate Session
                    </a>
                </div>
            </div>
        </nav>
    </header>
    <div style="height: 76px; width: 100%; flex-shrink: 0;"></div>
    {% endif %}

    <main class="flex-shrink-0">
        {% for mess in get_flashed_messages() %}
        <div class="container mt-4">
            <div class="alert alert-dismissible fade show alert-glass" role="alert">
                <i class="fas fa-info-circle mr-2" style="color: #4da3ff;"></i> {{ mess }}
                <button type="button" class="close" data-dismiss="alert" aria-label="Close"
                    style="color: #fff; opacity: 0.8; text-shadow: none;">
                    <span aria-hidden="true">&times;</span>
                </button>
            </div>
        </div>
        {% endfor %}

        {% block content %}{% endblock %}
    </main>

    <button id="backToTop" class="btn-back-to-top" title="Go to top">
        <i class="fas fa-arrow-up"></i>
    </button>

    <footer class="page-footer mt-auto py-4">
        <div class="footer-copyright text-center small" style="color: rgba(255,255,255,0.3); letter-spacing: 0.5px;">
            © 2026 MIS Department |
            <span id="companySignature" style="cursor: pointer; transition: color 0.2s;">
                Newtrends International Corporation
            </span>
        </div>
    </footer>

    <script>
        // Custom Dropdown Logic
        document.addEventListener('DOMContentLoaded', function () {
            const toggleBtn = document.getElementById('optionsToggleBtn');
            const dropdownMenu = document.getElementById('optionsDropdownMenu');

            if (toggleBtn && dropdownMenu) {
                toggleBtn.addEventListener('click', function (e) {
                    e.stopPropagation();
                    const isShown = dropdownMenu.classList.contains('show');
                    dropdownMenu.classList.toggle('show');
                    toggleBtn.classList.toggle('active');
                });

                document.addEventListener('click', function (e) {
                    if (!toggleBtn.contains(e.target) && !dropdownMenu.contains(e.target)) {
                        dropdownMenu.classList.remove('show');
                        toggleBtn.classList.remove('active');
                    }
                });
            }
        });

        // Scroll to Top logic
        var backToTopBtn = document.getElementById("backToTop");
        window.onscroll = function () {
            if (document.body.scrollTop > 300 || document.documentElement.scrollTop > 300) {
                backToTopBtn.style.display = "block";
            } else {
                backToTopBtn.style.display = "none";
            }
        };
        backToTopBtn.onclick = function () {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        // Developed By Animation (Easter Egg)
        $(document).ready(function () {
            let isAnimating = false;
            $('#companySignature').click(function () {
                if (isAnimating) return;
                isAnimating = true;

                const $this = $(this);
                const originalText = "Newtrends International Corporation";
                const devText = "Developed By: CarlosTheGreat & carinokarlos";

                let deleteInterval = setInterval(function () {
                    let currentText = $this.text();
                    if (currentText.length > 0) {
                        $this.text(currentText.slice(0, -1));
                    } else {
                        clearInterval(deleteInterval);
                        $this.css({ 'color': '#4da3ff', 'font-weight': 'bold', 'text-shadow': '0 0 10px rgba(77,163,255,0.5)' });

                        let i = 0;
                        let typeInterval = setInterval(function () {
                            $this.text(devText.substring(0, i + 1));
                            i++;
                            if (i === devText.length) {
                                clearInterval(typeInterval);
                                setTimeout(function () {
                                    $this.text(originalText).css({ 'color': '', 'font-weight': '', 'text-shadow': '' });
                                    isAnimating = false;
                                }, 3000);
                            }
                        }, 50);
                    }
                }, 30);
            });
        });
    </script>
</body>

</html>
